<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardware Specification Guide — Fresu Electronics</title>
<meta name="description" content="Define your hardware product spec before you touch a schematic. Interactive spec capture tool by Dario Fresu.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;
  --surface:#141414;
  --surface-2:#1c1c1c;
  --surface-3:#242424;
  --border:#383838;        /* was #242424 — FIXED */
  --border-focus:#555555;  /* visible interactive border */
  --fg:#ffffff;
  --fg-2:#e8edf5;          /* was fg-secondary */
  --fg-3:#c8d0dc;          /* hints, captions — visible */
  --accent:#00FF94;
  --accent-dim:rgba(0,255,148,.12);
  --accent-mid:rgba(0,255,148,.25);
  --star-off:#555555;      /* FIXED — was #242424, invisible */
  --wrong:#ff4d4d;
  --ease:cubic-bezier(0.22,1,0.36,1);
  --mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth;height:100%}
body{background:var(--bg);color:var(--fg);font-family:'Poppins',sans-serif;font-size:15px;line-height:1.7;overflow:hidden;height:100%;display:flex;flex-direction:column}
button,textarea,input{font-family:'Poppins',sans-serif}
textarea{resize:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-focus)}
::selection{background:var(--accent);color:#0a0a0a}

/* ─── NAV ─── */
.nav{background:rgba(10,10,10,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0;flex-shrink:0;z-index:100}
.nav-inner{max-width:none;padding:0 24px;display:grid;grid-template-columns:auto 1fr auto;align-items:center;height:52px;gap:20px}
.nav-logo img{height:34px;width:auto;display:block}
.nav-progress{display:flex;align-items:center;gap:14px}
.nav-progress-bar{flex:1;height:2px;background:var(--surface-3);border-radius:1px;overflow:hidden;min-width:120px}
.nav-progress-fill{height:100%;background:var(--accent);border-radius:1px;transition:width .4s var(--ease)}
.nav-progress-label{font-family:var(--mono);font-size:11px;color:var(--fg-3);min-width:6ch;text-align:right;font-variant-numeric:tabular-nums}
.nav-actions{display:flex;align-items:center;gap:8px}
.btn{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:9px 18px;border-radius:2px;border:none;cursor:pointer;transition:all .2s var(--ease);display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--accent);color:#0a0a0a}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--fg-3);border:1px solid var(--border);font-size:11px}
.btn-outline:hover{border-color:var(--border-focus);color:var(--fg)}
.btn-danger{background:transparent;color:#888;border:1px solid var(--border);font-size:11px}
.btn-danger:hover{border-color:var(--wrong);color:var(--wrong)}
.saved-badge{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.1em;opacity:0;transition:opacity .3s;display:flex;align-items:center;gap:5px}
.saved-badge.show{opacity:1}
.saved-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent)}

/* ─── SPLIT LAYOUT ─── */
.split{display:grid;grid-template-columns:1fr 420px;flex:1;min-height:0;overflow:hidden}

/* ─── LEFT — FORM PANEL ─── */
.form-panel{overflow-y:auto;padding:0}
.form-panel-inner{max-width:640px;margin:0 auto;padding:36px 36px 80px}

/* ─── STEP HEADER ─── */
.step-block{margin-bottom:48px}
.step-block:last-child{margin-bottom:0}
.step-tag{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:10px;margin-bottom:12px}
.step-tag::before{content:'';width:20px;height:1px;background:var(--accent)}
.step-title{font-size:22px;font-weight:700;letter-spacing:-.025em;line-height:1.25;margin-bottom:6px}
.step-desc{font-size:13px;color:var(--fg-3);line-height:1.65;margin-bottom:24px;max-width:52ch}

/* ─── QUESTION CARD ─── */
.q-card{background:var(--surface);border:1px solid var(--border);margin-bottom:12px;transition:border-color .2s}
.q-card:focus-within{border-color:var(--border-focus)}
.q-card-header{padding:16px 20px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.q-num{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--accent);letter-spacing:.1em;flex-shrink:0;padding-top:3px}
.q-title{font-size:14px;font-weight:600;color:var(--fg);line-height:1.4;flex:1}
.q-stars{display:flex;gap:3px;flex-shrink:0}
.star{width:18px;height:18px;cursor:pointer;transition:transform .12s,color .12s;color:var(--star-off)}
.star:hover,
.star-hover{color:var(--accent);transform:scale(1.2)}
.star.lit{color:var(--accent)}
.star svg{width:100%;height:100%;display:block}
.q-guide{padding:6px 20px 10px;font-size:12px;color:var(--fg-3);line-height:1.55}
.q-answer{padding:0 20px 16px}
.q-answer textarea{
  width:100%;background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:2px;color:var(--fg);
  font-size:13px;padding:10px 12px;
  min-height:72px;outline:none;line-height:1.6;
  transition:border-color .2s,background .2s;
}
.q-answer textarea::placeholder{color:#666;font-style:italic}
.q-answer textarea:focus{border-color:var(--accent);background:var(--surface-3)}
.q-answer textarea.has-content{border-color:var(--border-focus)}
.q-footer{padding:0 20px 14px;display:flex;align-items:center;justify-content:space-between}
.q-confidence-label{font-family:var(--mono);font-size:10px;color:#666;letter-spacing:.08em}
.q-confidence-label.rated{color:var(--fg-3)}
.q-wordcount{font-family:var(--mono);font-size:10px;color:#555;letter-spacing:.05em}

/* ─── STEP PROGRESS BAR ─── */
.step-progress{display:flex;gap:4px;margin-bottom:20px}
.step-pip{height:3px;flex:1;background:var(--surface-3);border-radius:2px;transition:background .3s}
.step-pip.done{background:var(--accent)}
.step-pip.partial{background:rgba(0,255,148,.4)}

/* ─── RIGHT — BRIEF PREVIEW ─── */
.preview-panel{border-left:1px solid var(--border);overflow-y:auto;background:var(--surface);display:flex;flex-direction:column}
.preview-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;background:var(--surface);z-index:10}
.preview-title{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-3)}
.preview-actions{display:flex;gap:6px}
.preview-inner{padding:24px;flex:1}
.brief-doc{font-size:12px;line-height:1.75;color:var(--fg-2)}
.brief-masthead{border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:20px}
.brief-logo{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.brief-h1{font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--fg);margin-bottom:4px}
.brief-meta{font-family:var(--mono);font-size:10px;color:#666;letter-spacing:.06em}
.brief-section{margin-bottom:20px}
.brief-section-title{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.brief-item{padding:8px 0;border-bottom:1px solid var(--surface-3)}
.brief-item:last-child{border-bottom:none}
.brief-item-q{font-size:11px;font-weight:600;color:var(--fg-3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;font-family:var(--mono)}
.brief-item-a{font-size:12px;color:var(--fg);line-height:1.6}
.brief-item-a.empty{color:#555;font-style:italic}
.brief-stars{display:flex;gap:2px;margin-top:3px}
.brief-star{font-size:9px;color:var(--accent)}
.brief-star.off{color:var(--surface-3)}
.brief-completeness{margin-top:16px;padding:12px;background:var(--surface-2);border:1px solid var(--border)}
.brief-comp-label{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);margin-bottom:8px}
.brief-comp-bar{height:2px;background:var(--surface-3);margin-bottom:6px}
.brief-comp-fill{height:100%;background:var(--accent);transition:width .5s var(--ease)}
.brief-comp-pct{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent)}

/* ─── EMPTY STATE ─── */
.preview-empty{padding:40px 24px;text-align:center;color:#555}
.preview-empty-icon{font-size:32px;margin-bottom:12px;opacity:.4}
.preview-empty-text{font-size:13px;line-height:1.6}

/* ─── MODAL ─── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);max-width:400px;width:100%;padding:28px}
.modal h2{font-size:17px;font-weight:700;margin-bottom:8px}
.modal p{font-size:13px;color:var(--fg-3);line-height:1.6;margin-bottom:20px}
.modal-actions{display:flex;gap:8px}

/* ─── PRINT / PDF ─── */
@media print{
  body{overflow:visible;background:#fff;color:#000;font-size:11pt}
  .nav,.preview-panel,.overlay{display:none!important}
  .split{display:block;overflow:visible}
  .form-panel{overflow:visible}
  .form-panel-inner{max-width:none;padding:0}
  .step-block{page-break-inside:avoid;margin-bottom:32pt}
  .step-tag{color:#00aa66;font-size:8pt}
  .step-title{font-size:16pt;color:#000}
  .step-desc{color:#444;font-size:9pt}
  .step-progress{display:none}
  .q-card{border:1pt solid #ccc;background:#fff;margin-bottom:8pt;page-break-inside:avoid}
  .q-num{color:#00aa66}
  .q-title{color:#000}
  .q-guide{color:#666;font-size:8pt}
  .q-answer textarea{border:none;background:transparent;color:#000;font-size:10pt;min-height:auto;padding:4pt 0}
  .q-stars .star{color:#ccc}
  .q-stars .star.lit{color:#00aa66}
  .q-footer{border-top:0.5pt solid #eee;padding-top:4pt}
  .q-confidence-label{color:#888;font-size:8pt}
  .q-wordcount{display:none}
}

/* ─── MOBILE ─── */
@media(max-width:900px){
  body{overflow:auto}
  .split{grid-template-columns:1fr;overflow:visible}
  .preview-panel{display:none}
  .form-panel{overflow:visible}
  .form-panel-inner{padding:24px 20px 60px}
  .nav-inner{padding:0 16px;grid-template-columns:auto 1fr auto}
  .nav-progress{display:none}
}
@media(max-width:480px){
  .nav-actions .btn-outline,.nav-actions .btn-danger{display:none}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a href="https://www.fresuelectronics.com">
      <img src="https://raw.githubusercontent.com/dariofresu/Fresu-Electronics-Blog/main/assets/logo.png" alt="Fresu Electronics" style="height:34px;width:auto">
    </a>
    <div class="nav-progress">
      <div class="nav-progress-bar"><div class="nav-progress-fill" id="nav-fill" style="width:0%"></div></div>
      <span class="nav-progress-label" id="nav-label">0 / 20</span>
      <span class="saved-badge" id="saved-badge">Saved</span>
    </div>
    <div class="nav-actions">
      <button class="btn btn-primary" onclick="window.print()">Export PDF ↓</button>
      <button class="btn btn-outline" onclick="downloadTool()">Save Offline</button>
      <button class="btn btn-danger" onclick="showReset()">Reset</button>
    </div>
  </div>
</nav>

<!-- SPLIT -->
<div class="split">

  <!-- FORM PANEL -->
  <div class="form-panel" id="form-panel">
    <div class="form-panel-inner" id="form-inner"></div>
  </div>

  <!-- PREVIEW PANEL -->
  <div class="preview-panel">
    <div class="preview-header">
      <span class="preview-title">Live Brief Preview</span>
      <div class="preview-actions">
        <button class="btn btn-outline" style="font-size:10px" onclick="exportBrief()">Export HTML ↓</button>
      </div>
    </div>
    <div class="preview-inner" id="preview-inner">
      <div class="preview-empty">
        <div class="preview-empty-icon">📄</div>
        <div class="preview-empty-text">Start answering questions on the left.<br>Your brief builds here in real time.</div>
      </div>
    </div>
  </div>

</div>

<!-- RESET MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Reset all answers?</h2>
    <p>This clears every answer, confidence rating, and resets progress. Previously exported briefs are not affected.</p>
    <div class="modal-actions">
      <button class="btn btn-primary" style="background:var(--wrong)" onclick="confirmReset()">Yes, reset</button>
      <button class="btn btn-outline" onclick="hideReset()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const STEPS = [
  {
    id: 's1',
    tag: 'Step 01 of 04',
    title: 'Product Vision',
    desc: 'Who is this for, what problem does it solve, and why now? Engineers who can\'t answer these clearly build the wrong thing faster.',
    questions: [
      { id: 'q01', title: 'Problem statement', guide: 'What specific problem does this product solve? State it in one sentence — no technical jargon. If you need two sentences, the problem isn\'t clear yet.' },
      { id: 'q02', title: 'Target user', guide: 'Who uses this? Role, industry, context of use. Not "engineers" — be specific. "A mechanical engineer at a Tier-1 automotive supplier designing battery management systems."' },
      { id: 'q03', title: 'Market opportunity', guide: 'Why is now the right time? What trend, regulatory change, or gap makes this viable today that wasn\'t viable 2 years ago?' },
      { id: 'q04', title: 'Success criteria', guide: 'How will you know this product succeeded in 12 months? Name 2–3 measurable outcomes — not "it works," but actual metrics.' },
      { id: 'q05', title: 'Competitive advantage', guide: 'What makes this distinctly better or different from existing solutions? One clear, honest differentiator beats a list of vague ones.' },
    ]
  },
  {
    id: 's2',
    tag: 'Step 02 of 04',
    title: 'Technical Requirements',
    desc: 'Every vague requirement here becomes a costly rework later. Numbers beat adjectives — "fast" means nothing, "< 5 ms latency" does.',
    questions: [
      { id: 'q06', title: 'Performance specifications', guide: 'Key metrics with target values and tolerances: speed, accuracy, range, resolution, throughput, latency, sample rate. Include the condition under which each is measured.' },
      { id: 'q07', title: 'Power budget', guide: 'Supply voltage(s), max current draw, efficiency target. If battery-powered: capacity (mAh/Wh), target run time, and acceptable charge time. If mains: input range, power factor requirement.' },
      { id: 'q08', title: 'Environmental conditions', guide: 'Operating temperature range (°C), storage temperature, humidity (% RH), altitude, vibration profile, shock, IP rating. Note which are hard requirements vs. targets.' },
      { id: 'q09', title: 'Form factor & mechanical', guide: 'PCB max dimensions (mm), enclosure type (closed/open/DIN rail/panel mount), connector face locations, mounting holes, any keep-out zones, height constraints.' },
      { id: 'q10', title: 'Unit cost target', guide: 'Target BOM cost at volume (1k / 10k / 100k units). Identify the top 3 cost drivers. Flag any components with >30% BOM cost contribution — these drive architectural decisions.' },
      { id: 'q11', title: 'Reliability & lifetime', guide: 'Expected product operating lifetime (hours or years), MTBF target if applicable, key failure modes to design against, warranty period. State the mission profile.' },
    ]
  },
  {
    id: 's3',
    tag: 'Step 03 of 04',
    title: 'Architecture & Interfaces',
    desc: 'Define what connects to what before you assign a single footprint. The block diagram is the design — everything else is implementation detail.',
    questions: [
      { id: 'q12', title: 'Top-level block diagram', guide: 'Describe the major functional blocks and their interconnections. If you can\'t describe it in text, sketch it and describe what you sketched. Identify the critical signal paths.' },
      { id: 'q13', title: 'Key component candidates', guide: 'MCU/processor/FPGA, power management ICs, key sensors or actuators, memory, communication ICs. Initial candidates with part numbers if known. Flag single-source risks.' },
      { id: 'q14', title: 'External interfaces & connectors', guide: 'List every I/O connector and protocol: USB (which version/class), Ethernet (speed), CAN, RS-485, SPI, I²C, UART, analog inputs/outputs, RF, GPIO. Include signal levels and max cable length.' },
      { id: 'q15', title: 'High-speed & signal-integrity critical nets', guide: 'Which signals will drive PCB layout decisions? DDR, PCIe, USB HS, LVDS, clock distribution, high-current switching nodes. Note required impedance (e.g. 50 Ω, 100 Ω diff).' },
      { id: 'q16', title: 'PCB stack-up & layer count', guide: 'Estimated layer count and rationale. Controlled impedance requirements. Any shielding layer needs. EMI-sensitive areas. Minimum trace/space if constrained by cost or fab capability.' },
    ]
  },
  {
    id: 's4',
    tag: 'Step 04 of 04',
    title: 'Compliance & Risk',
    desc: 'Decide which certifications you\'re targeting before the first trace is placed. Retrofitting compliance costs 3× more than designing for it from the start.',
    questions: [
      { id: 'q17', title: 'Target certifications', guide: 'FCC Part 15 / CE (EMC + LVD + RED) / UKCA / UL 62368-1 / RoHS / REACH / automotive (AEC-Q, IATF 16949) / medical (IEC 60601-1) / industrial (IEC 61010). State the specific standards, not just regions.' },
      { id: 'q18', title: 'EMC strategy', guide: 'EMI control approach at architecture level: filtering strategy at I/O, shielding plan (enclosure vs PCB), PCB-level mitigation (stack-up, layer assignment, return path planning). Who owns the EMC review — internal or external?' },
      { id: 'q19', title: 'Supply chain risk', guide: 'Long-lead components (>16 weeks lead time), single-source ICs, components under export control, components at end-of-life. Are there qualified second-sources for the top 5 BOM items by cost?' },
      { id: 'q20', title: 'Development timeline', guide: 'Key milestones with target dates: schematic complete, layout complete, first article build, DVT, EMC pre-compliance, formal compliance testing, production release. Which milestones are externally committed?' },
    ]
  }
];

const TOTAL_Q = STEPS.reduce((n, s) => n + s.questions.length, 0);
const STORAGE_KEY = 'fresu_hwspec_v3';
let state = {};

function loadState() {
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch(e) { state = {}; }
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e) {}
  const el = document.getElementById('saved-badge');
  el.classList.add('show');
  clearTimeout(window._saveTimer);
  window._saveTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

function getQ(id) { return state[id] || { answer: '', stars: 0 }; }

// ─── STAR SVG ───────────────────────────────────────────────────────────────
function starSVG(lit) {
  return `<svg viewBox="0 0 24 24" fill="${lit?'currentColor':'none'}" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
}

// ─── RENDER FORM ─────────────────────────────────────────────────────────────
function renderForm() {
  let html = '';
  STEPS.forEach(step => {
    const filled = step.questions.filter(q => (getQ(q.id).answer || '').trim().length > 10).length;
    html += `<div class="step-block" id="${step.id}">`;
    html += `<div class="step-tag">${step.tag}</div>`;
    html += `<div class="step-title">${step.title}</div>`;
    html += `<div class="step-desc">${step.desc}</div>`;
    // Step progress pips
    html += `<div class="step-progress">`;
    step.questions.forEach(q => {
      const ans = (getQ(q.id).answer || '').trim();
      const cls = ans.length > 30 ? 'done' : ans.length > 5 ? 'partial' : '';
      html += `<div class="step-pip ${cls}" id="pip-${q.id}"></div>`;
    });
    html += `</div>`;
    // Questions
    step.questions.forEach(q => {
      const s = getQ(q.id);
      const wordCount = s.answer ? s.answer.trim().split(/\s+/).filter(Boolean).length : 0;
      const hasContent = s.answer && s.answer.trim().length > 5;
      html += `
        <div class="q-card" id="card-${q.id}">
          <div class="q-card-header">
            <div class="q-num">${q.id.toUpperCase()}</div>
            <div class="q-title">${q.title}</div>
            <div class="q-stars" id="stars-${q.id}">
              ${[1,2,3,4,5].map(i => `<span class="star${i<=s.stars?' lit':''}" data-qid="${q.id}" data-n="${i}" onclick="setStar('${q.id}',${i})">${starSVG(i<=s.stars)}</span>`).join('')}
            </div>
          </div>
          <div class="q-guide">${q.guide}</div>
          <div class="q-answer">
            <textarea
              id="ans-${q.id}"
              placeholder="Write your answer here…"
              oninput="setAnswer('${q.id}',this.value)"
              class="${hasContent?'has-content':''}"
            >${s.answer||''}</textarea>
          </div>
          <div class="q-footer">
            <span class="q-confidence-label${s.stars ? ' rated' : ''}">${s.stars ? ['','Low','Fair','Good','High','Locked'][s.stars]+' confidence' : 'Rate your confidence →'}</span>
            <span class="q-wordcount" id="wc-${q.id}">${wordCount>0?wordCount+' words':''}</span>
          </div>
        </div>`;
    });
    html += `</div>`;
  });
  document.getElementById('form-inner').innerHTML = html;
  updateProgress();
  updatePreview();
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function setAnswer(id, val) {
  state[id] = { ...getQ(id), answer: val };
  saveState();
  // Update pip
  const pip = document.getElementById('pip-' + id);
  if (pip) {
    const len = val.trim().length;
    pip.className = 'step-pip' + (len > 30 ? ' done' : len > 5 ? ' partial' : '');
  }
  // Update textarea class
  const ta = document.getElementById('ans-' + id);
  if (ta) ta.className = val.trim().length > 5 ? 'has-content' : '';
  // Word count
  const wc = document.getElementById('wc-' + id);
  if (wc) {
    const words = val.trim().split(/\s+/).filter(Boolean).length;
    wc.textContent = words > 0 ? words + ' words' : '';
  }
  updateProgress();
  updatePreview();
}

function setStar(id, n) {
  const s = getQ(id);
  const newStars = s.stars === n ? 0 : n;
  state[id] = { ...s, stars: newStars };
  saveState();
  const container = document.getElementById('stars-' + id);
  if (container) {
    container.querySelectorAll('.star').forEach((el, i) => {
      el.className = 'star' + (i < newStars ? ' lit' : '');
      el.innerHTML = starSVG(i < newStars);
    });
  }
  // Update confidence label
  const card = document.getElementById('card-' + id);
  if (card) {
    const label = card.querySelector('.q-confidence-label');
    if (label) {
      label.className = 'q-confidence-label' + (newStars ? ' rated' : '');
      label.textContent = newStars ? ['','Low','Fair','Good','High','Locked'][newStars]+' confidence' : 'Rate your confidence →';
    }
  }
  updatePreview();
}

// ─── PROGRESS ────────────────────────────────────────────────────────────────
function updateProgress() {
  const answered = STEPS.reduce((n, s) =>
    n + s.questions.filter(q => (getQ(q.id).answer||'').trim().length > 10).length, 0);
  const pct = Math.round(answered / TOTAL_Q * 100);
  const fill = document.getElementById('nav-fill');
  const label = document.getElementById('nav-label');
  if (fill) fill.style.width = pct + '%';
  if (label) label.textContent = answered + ' / ' + TOTAL_Q;
}

// ─── PREVIEW ─────────────────────────────────────────────────────────────────
function updatePreview() {
  const answered = STEPS.reduce((n, s) =>
    n + s.questions.filter(q => (getQ(q.id).answer||'').trim().length > 5).length, 0);

  if (answered === 0) {
    document.getElementById('preview-inner').innerHTML = `
      <div class="preview-empty">
        <div class="preview-empty-icon">📄</div>
        <div class="preview-empty-text">Start answering questions on the left.<br>Your brief builds here in real time.</div>
      </div>`;
    return;
  }

  const date = new Date().toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'});
  const pct = Math.round(answered / TOTAL_Q * 100);

  let html = `<div class="brief-doc">`;
  html += `<div class="brief-masthead">`;
  html += `<div class="brief-logo">Fresu Electronics</div>`;
  html += `<div class="brief-h1">Product Specification Brief</div>`;
  html += `<div class="brief-meta">Generated ${date} &nbsp;·&nbsp; ${answered} of ${TOTAL_Q} questions answered</div>`;
  html += `</div>`;

  STEPS.forEach(step => {
    const hasAny = step.questions.some(q => (getQ(q.id).answer||'').trim().length > 5);
    if (!hasAny) return;
    html += `<div class="brief-section">`;
    html += `<div class="brief-section-title">${step.title}</div>`;
    step.questions.forEach(q => {
      const s = getQ(q.id);
      const ans = (s.answer||'').trim();
      html += `<div class="brief-item">`;
      html += `<div class="brief-item-q">${q.title}</div>`;
      if (ans) {
        html += `<div class="brief-item-a">${ans.replace(/\n/g,'<br>')}</div>`;
        if (s.stars) {
          html += `<div class="brief-stars">`;
          for (let i=1;i<=5;i++) html += `<span class="brief-star${i<=s.stars?'':' off'}">${i<=s.stars?'★':'☆'}</span>`;
          html += `</div>`;
        }
      } else {
        html += `<div class="brief-item-a empty">Not yet answered</div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  });

  html += `<div class="brief-completeness">`;
  html += `<div class="brief-comp-label">Spec completeness</div>`;
  html += `<div class="brief-comp-bar"><div class="brief-comp-fill" style="width:${pct}%"></div></div>`;
  html += `<div class="brief-comp-pct">${pct}% complete</div>`;
  html += `</div>`;
  html += `</div>`;

  document.getElementById('preview-inner').innerHTML = html;
}

// ─── DOWNLOAD TOOL ────────────────────────────────────────────────────────────
function downloadTool() {
  const src = document.documentElement.outerHTML;
  const blob = new Blob([src], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'hardware-spec-guide.html';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ─── RESET ───────────────────────────────────────────────────────────────────
function showReset() { document.getElementById('overlay').classList.add('open'); }
function hideReset() { document.getElementById('overlay').classList.remove('open'); }
function confirmReset() {
  state = {};
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  hideReset();
  renderForm();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadState();
renderForm();
